version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: users_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: csv_processor
    ports:
      - "3003:3003"
    depends_on:
      - postgres
    environment:
      PORT: 3003
      CSV_FILE_PATH: /app/data/users.csv
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: users_db
    volumes:
      - ./data:/app/data
